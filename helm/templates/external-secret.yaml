{{- if .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mongodb-secret
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}

  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreName }}
    kind: {{ .Values.externalSecret.secretStoreKind }}

  target:
    name: {{ .Values.externalSecret.targetSecretName }}
    creationPolicy: Owner

  data:
    - secretKey: MONGO_INITDB_ROOT_USERNAME
      remoteRef:
        key: {{ .Values.externalSecret.awsSecretName }}
        property: MONGO_INITDB_ROOT_USERNAME

    - secretKey: MONGO_INITDB_ROOT_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecret.awsSecretName }}
        property: MONGO_INITDB_ROOT_PASSWORD

    - secretKey: MONGO_REPLICA_SET_KEY
      remoteRef:
        key: {{ .Values.externalSecret.awsSecretName }}
        property: MONGO_REPLICA_SET_KEY
{{- end }}